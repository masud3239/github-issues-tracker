<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <!-- Title and logo -->
    <title>GitHub Issues Tracker | Login </title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

     <!-- Tailwind + DaisyUI -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts integration -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
     

<style>
    * {
         font-family: "Geist", sans-serif;
    }
</style>
</head>

<body class="flex justify-between items-center min-h-screen bg-base-200">
   <div class="card w-[520px] bg-base-100 p-6 shadow-xl">
 <img class="w-[100px] h-[100px] mx-auto mb-[24px]" src="./assets/github-logo.png" alt="">

 <h1 class="text-2xl font-semibold text-center">GitHub Issues Tracker</h1>

<p class="text-[16px] text-center text-[#64748b] mb-6">Sign in to manage your issues</p>

<label class="label text-[16px] text-neutral font-medium mb-2">Username</label>
<input id="username"
class="input input-bordered w-full mb-6"
placeholder="Enter Username">

<p class="text-[14px] text-[#4A00FF] mb-6">Default: admin</p>

<label class="label text-[16px] text-neutral font-medium mb-2">Password</label>
<input id="password"
type="password"
class="input input-bordered w-full mb-6"
placeholder="Enter Password">

<p class="text-[14px] text-[#4A00FF] mb-6">Default: admin123</p>

<button onclick="login()" class="btn btn-primary rounded bg-[#4A00ff] w-full text-[16px] mb-[40px]">
 Sign In
</button>

<div class="divider text-[16px]">OR</div>

<div class="bg-gray-100 p-3 rounded text-center">
    <p class="text-[14px] text-[#64748B] mb-6 text-l">Demo Credentials:</p><br> 
    <p class="text-[16px]"><strong>Username:</strong> admin</p>
    <p class="text-[16px]"><strong>Password:</strong> admin123</p>
</div>


</div>

</body>
</html>
