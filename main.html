<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker | Dashboard </title>

<link rel="shortcut icon" href="./assets/github-logo.png">

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- DAISYUI + TAILWIND -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- fonts integration -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
     

<style>
    * {
         font-family: "Geist", sans-serif;
    }
</style>

</head>

<body class="bg-base-200">

<!-- Navbar Section -->

<div class="navbar bg-base-100 shadow px-6 justify-between">

<div class="flex items-center gap-3">
<img src="./assets/github-logo.png" class="w-9 h-[37px]">
<h1 class="text-[16px] md:text-2xl font-semibold">
GitHub Issues Tracker
</h1>
</div>

<div class="flex items-center gap-3">

<div class="relative">

<i class="fa-solid fa-magnifying-glass
absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>

<input id="searchInput"
class="input input-bordered pl-10 text-[16px]"
placeholder="Search issues...">

</div>

<button onclick="searchIssues()"
class="btn btn-primary text-[16px] font-semibold">
 + New Issue
</button>

</div>

</div>


<!-- Tabs -->

<div class="px-6 mt-6">

<div class="tabs tabs-boxed gap-4">

<a class="tab tab-active btn btn-primary"
onclick="filterTab('all',this)">
All
</a>

<a class="tab btn btn-soft btn-success"
onclick="filterTab('open',this)">
Open
</a>

<a class="tab btn btn-soft btn-error"
onclick="filterTab('closed',this)">
Closed
</a>

</div>

</div>


<!-- Issue header -->

<div class="flex justify-between px-6 mt-4">

<!--  left side -->
<div class="flex items-center gap-3">

<img src="./assets/Aperture.png" class="w-8 h-8 bg-purple-200 rounded-full p-1" alt="">

<div>
<h2 id="issueCount" class="text-[20px] font-semibold">
Issues
</h2>

<p class="text-[16px] text-[#64748B]">
Track and manage your project issues
</p>
</div>

</div>


<!-- Right side -->
<div class="flex gap-4">

<div class="flex items-center gap-2">
<div class="w-3 h-3 bg-green-500 rounded-full text-[16px] font-semibold"></div>
Open
</div>

<div class="flex items-center gap-2">
<div class="w-3 h-3 bg-purple-500 rounded-full text-[16px] font-semibold"></div>
Closed
</div>

</div>

</div>

<!-- Spinner -->

<div class="text-center mt-10">

<span id="spinner"
class="loading loading-spinner loading-lg text-primary hidden">
</span>

</div>


<!-- Issue Grid -->

<div id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-6">

</div>


<!--  Modal Section -->

<dialog id="issueModal" class="modal">

<div class="modal-box max-w-3xl">

<!-- Title -->

<h2 id="modalTitle"
class="text-2xl font-bold mb-2">
</h2>


<!-- Status + Author -->

<div class="flex items-center gap-3 mb-4">

<span id="modalStatus"
class="badge badge-success">
Open
</span>

<span class="text-[#64748B] text-[12px]">

 • Opened by 
<b id="modalAuthor"></b>

•

<span id="modalDate"></span>

</span>

</div>


<!-- Labels -->

<div class="flex gap-2 mb-4">

<span id="modalLabel"
class="badge badge-error">
</span>

<span class="badge badge-warning">
Help Wanted
</span>

</div>


<!-- Description -->

<p id="modalDescription"
class="text-[#64748B] text-[16px] mb-6">
</p>


<!-- Assignee + Priority  -->

<div class="bg-base-200 p-4 rounded-lg grid grid-cols-3">

<!-- Left -->
<div>
<p class="text-sm text-gray-500">
Assignee:
</p>

<p id="modalAssignee" class="font-semibold">
</p>
</div>

<!-- Center -->
<div class="text-center">
<p class="text-sm text-gray-500">
Priority:
</p>

<span id="modalPriority" class="badge badge-error">
</span>
</div>

</div>


<!--  Close button -->

<div class="modal-action">

<form method="dialog">

<button class="btn btn-primary">
Close
</button>

</form>

</div>

</div>

</dialog>


<script src="main.js"></script>

</body>
</html>
